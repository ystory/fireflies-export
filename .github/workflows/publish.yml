name: Publish

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine whether publish is needed
        if: steps.changesets.outputs.hasChangesets == 'false'
        id: publish_check
        shell: bash
        run: |
          package_name=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log(pkg.name)")
          package_version=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log(pkg.version)")
          published_version=$(npm view "$package_name" version --cache ./.npm-cache 2>/dev/null || true)

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

          if [ "$package_version" = "$published_version" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Current version already published; skipping npm publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.publish_check.outputs.should_publish == 'true'
        run: pnpm run release:publish

      - name: Create GitHub release
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.publish_check.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="v${{ steps.publish_check.outputs.package_version }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub release $tag already exists; skipping."
            exit 0
          fi

          gh release create "$tag" --generate-notes --target "${GITHUB_SHA}"
